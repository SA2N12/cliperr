# Override production : ajoute Caddy (HTTPS + domaine) devant l'app.
# Déploiement VPS :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  caddy-data:
  caddy-config:
